# This is a basic workflow to help you get started with Actions

name: Create Theme package

# Controls when the workflow will run
on:
 release:
   types:
     - created
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
        with:
          path: kaaac.fia_universal_theme

      # Runs a single command using the runners shell
      - name: Create ZIP Package
        run: |
          shopt -s dotglob
          zip -r FIA-Universal-Theme.zip * -x "**/.*" "**/.*/**"
      # Runs a set of commands using the runners shell
      - name: Upload ZIP as release asset
        uses: softprops/action-gh-release@v1
        with:
          files: FIA-Universal-Theme.zip
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          
      - name: Label fixed issues
        uses: actions/github-script@v6
        with:
          script: |
            const release = context.payload.release;
            const issueNumbers = release.body.match(/#(\d+)/g);
            for (const num of issueNumbers || []) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(num.slice(1)),
                labels: ['released', `released-in-${release.tag_name}`]
              });
            }